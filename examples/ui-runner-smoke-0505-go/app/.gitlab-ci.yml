stages:
  - test
  - build
  - deploy

variables:
  IMAGE_REPOSITORY: "localhost:5001/jeridevops/ui-runner-smoke-0505-go"
  GITOPS_REPO_URL: "http://root:F8v%23Q4z%21K7m%40N2p%25@gitlab/root/ui-runner-smoke-0505-gitops.git"
  GITOPS_VALUES_FILE: "charts/ui-runner-smoke-0505/values/dev.yaml"

test:
  stage: test
  image: golang:1.25-alpine
  script:
    - go test ./...

build_image:
  stage: build
  image: docker:27-cli
  script:
    - export IMAGE_TAG="${CI_COMMIT_SHORT_SHA}"
    - docker build -t "${IMAGE_REPOSITORY}:${IMAGE_TAG}" .
    - docker push "${IMAGE_REPOSITORY}:${IMAGE_TAG}"
    - printf "IMAGE_REPOSITORY=%s\nIMAGE_TAG=%s\n" "${IMAGE_REPOSITORY}" "${IMAGE_TAG}" > build.env
  artifacts:
    reports:
      dotenv: build.env

update_gitops_values:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build_image
      artifacts: true
  before_script:
    - apk add --no-cache git python3 py3-yaml
    - git config --global user.email "ci@jeridevops.local"
    - git config --global user.name "JeriDevOps CI"
  script:
    - sh scripts/update-gitops-values.sh
