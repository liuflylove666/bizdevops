apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ui-runner-smoke-0505.name" . }}
  labels:
    {{- include "ui-runner-smoke-0505.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ui-runner-smoke-0505.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ui-runner-smoke-0505.labels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: APP_NAME
              value: {{ include "ui-runner-smoke-0505.name" . | quote }}
            - name: APP_VERSION
              value: {{ .Values.image.tag | quote }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
